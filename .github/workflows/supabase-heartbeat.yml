name: Supabase Auto-Restore
on:
  schedule:
    - cron: '0 10 * * *'   # Daily at 10:00 UTC — checks every day
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restore if paused
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          echo "Checking project status..."
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" -ne 200 ]; then
            echo "Failed to fetch project status (HTTP $http_code):"
            echo "$body"
            exit 1
          fi

          status=$(echo "$body" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          echo "Project status: $status"

          if [ "$status" = "INACTIVE_PAUSED" ]; then
            echo "Project is paused — triggering restore..."
            restore_response=$(curl -sS -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/restore")

            restore_code=$(echo "$restore_response" | tail -1)
            restore_body=$(echo "$restore_response" | head -n -1)

            echo "Restore response (HTTP $restore_code):"
            echo "$restore_body"

            if [ "$restore_code" -ne 201 ]; then
              echo "Restore request failed"
              exit 1
            fi

            echo "Restore triggered successfully — project should be active in ~1-2 minutes"
          else
            echo "Project is healthy ($status) — nothing to do"
          fi
